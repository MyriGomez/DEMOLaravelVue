
services:
  app:
    build:
      context: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    env_file:
      - ../DEMOLaravelVueSecrets/proyecto.env

  web:
    image: nginx:latest
    container_name: nginx_web
    ports:
      - "18080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
    container_name: vue_app
    ports:
      - "15173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    env_file:
      - ../DEMOLaravelVueSecrets/proyecto.env
    ports:
      - "13306:3306"
    volumes:
      - db-data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: adminer_db
    ports:
      - "18081:8080"
    depends_on:
      - db
    environment:
      - ADMINER_DEFAULT_SERVER=db

volumes:
  db-data: